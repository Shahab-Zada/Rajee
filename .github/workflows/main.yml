name: Next js build with caching and artifiacts
on: 
 push:
   branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
        
      - name: setup node js
        uses: actions/setup-node@v6.2.0
        with:
         node-version: 22.x
         cache: 'npm'
         
      - name: Install Dependencies
        run: npm install
        
      - name: Build Next JS App
        run: npm run build
        
      - name: Build on Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Next JS Build
          path: out/
          
           
        
          
       
        
       
      
